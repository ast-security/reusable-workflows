name: KICS Reusable Scan

on:
  workflow_call:
    inputs:
      scan_paths:
        description: Comma-separated list of files or folders to scan.
        required: false
        type: string
        default: "."
      fail_on:
        description: Comma-separated severities that fail the workflow.
        required: false
        type: string
        default: "critical,high"
      ignore_on_exit:
        description: none to enforce fail_on, results to report-only mode.
        required: false
        type: string
        default: "none"
      exclude_paths:
        description: Comma-separated paths to exclude.
        required: false
        type: string
        default: ""
      include_queries:
        description: Comma-separated query IDs to include.
        required: false
        type: string
        default: ""
      exclude_queries:
        description: Comma-separated query IDs to exclude.
        required: false
        type: string
        default: ""
      exclude_categories:
        description: Comma-separated query categories to exclude.
        required: false
        type: string
        default: ""
      exclude_severities:
        description: Comma-separated severities to suppress from results.
        required: false
        type: string
        default: ""
      exclude_results:
        description: Comma-separated result IDs to exclude.
        required: false
        type: string
        default: ""
      queries_path:
        description: Path to local custom queries directory.
        required: false
        type: string
        default: ""
      output_formats:
        description: Comma-separated output formats (json,sarif,junit,html,pdf,cyclonedx,sonarqube).
        required: false
        type: string
        default: "json"
      output_path:
        description: Output folder for scan artifacts.
        required: false
        type: string
        default: "kics-results"
      timeout_seconds:
        description: Scan timeout in seconds.
        required: false
        type: number
        default: 600
      platform_type:
        description: Optional platform filter (for example Terraform, Kubernetes, Dockerfile, Ansible, CloudFormation, Helm, Databricks, AzureResourceManager, DockerCompose).
        required: false
        type: string
        default: ""
      type:
        description: Optional explicit KICS type selector.
        required: false
        type: string
        default: ""
      cloud_provider:
        description: Optional cloud provider filter.
        required: false
        type: string
        default: ""
      disable_secrets:
        description: Disable secrets scanning.
        required: false
        type: boolean
        default: false
      secrets_regexes_path:
        description: Path to custom secrets regexes file.
        required: false
        type: string
        default: ""
      disable_full_descriptions:
        description: Disable remote query metadata enrichment.
        required: false
        type: boolean
        default: true
      config_path:
        description: Path to KICS config file.
        required: false
        type: string
        default: ""
      upload_sarif:
        description: Upload SARIF to GitHub code scanning.
        required: false
        type: boolean
        default: false
      upload_artifacts:
        description: Upload KICS output folder as artifact.
        required: false
        type: boolean
        default: true
      artifact_retention_days:
        description: Artifact retention window in days.
        required: false
        type: number
        default: 14
      enable_annotations:
        description: Enable PR annotations.
        required: false
        type: boolean
        default: true
      enable_jobs_summary:
        description: Enable job summary output.
        required: false
        type: boolean
        default: true
      enable_comments:
        description: Enable PR comments.
        required: false
        type: boolean
        default: false
      bom:
        description: Enable bill of materials output.
        required: false
        type: boolean
        default: false
      verbose:
        description: Enable verbose logs.
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write

jobs:
  kics-scan:
    name: KICS Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare output directory
        run: mkdir -p "${{ inputs.output_path }}"

      - name: Run KICS scan
        uses: Checkmarx/kics-github-action@05aa5eb70eede1355220f4ca5238d96b397e30a6
        with:
          path: ${{ inputs.scan_paths }}
          fail_on: ${{ inputs.fail_on }}
          ignore_on_exit: ${{ inputs.ignore_on_exit }}
          exclude_paths: ${{ inputs.exclude_paths }}
          include_queries: ${{ inputs.include_queries }}
          exclude_queries: ${{ inputs.exclude_queries }}
          exclude_categories: ${{ inputs.exclude_categories }}
          exclude_severities: ${{ inputs.exclude_severities }}
          exclude_results: ${{ inputs.exclude_results }}
          queries: ${{ inputs.queries_path }}
          output_formats: ${{ inputs.output_formats }}
          output_path: ${{ inputs.output_path }}
          timeout: ${{ inputs.timeout_seconds }}
          platform_type: ${{ inputs.platform_type }}
          type: ${{ inputs.type }}
          cloud_provider: ${{ inputs.cloud_provider }}
          disable_secrets: ${{ inputs.disable_secrets }}
          secrets_regexes_path: ${{ inputs.secrets_regexes_path }}
          disable_full_descriptions: ${{ inputs.disable_full_descriptions }}
          config_path: ${{ inputs.config_path }}
          enable_annotations: ${{ inputs.enable_annotations }}
          enable_jobs_summary: ${{ inputs.enable_jobs_summary }}
          enable_comments: ${{ inputs.enable_comments }}
          bom: ${{ inputs.bom }}
          verbose: ${{ inputs.verbose }}

      - name: Upload KICS artifacts
        if: ${{ always() && inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: kics-results
          path: ${{ inputs.output_path }}
          retention-days: ${{ inputs.artifact_retention_days }}

